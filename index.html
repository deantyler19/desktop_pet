<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<style>
  :root { --coral: #bf5e3b; --coral-dark: #a44d2f; --eye: #161616; }
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
  html, body {
    width: 100%; height: 100%;
    background: transparent; overflow: hidden;
    font-family: -apple-system, "Segoe UI", sans-serif;
    cursor: default;
  }
  #pet { position: absolute; inset: 0; cursor: default; }
  /* 펫 그림은 창 하단 120x100 영역에 고정 (위쪽은 말풍선 공간) — 커서도 펫 위에서만 grab */
  #petbox { position: absolute; left: 0; bottom: 0; width: 120px; height: 100px; cursor: grab; }
  #pet.held #petbox { cursor: grabbing; }

  /* 위아래 흔들림 / 걷기 (몸통) */
  #body-wrap {
    width: 100%; height: 100%;
    transform-origin: 50% 92%;
    animation: breathe 3.4s ease-in-out infinite;
  }
  @keyframes breathe {
    0%,100% { transform: translateY(0) scale(1); }
    50% { transform: translateY(-2px) scale(1.01); }
  }
  /* 걸을 때: 중립 뒤뚱임 + 통통 (방향은 얼굴/눈동자가 진행 쪽을 향하는 것으로만 전달) */
  #pet.walking #body-wrap { animation: walk .44s ease-in-out infinite; }
  @keyframes walk {
    0%,100% { transform: translateY(0) rotate(-2deg); }
    50%     { transform: translateY(-2px) rotate(2deg); }
  }
  /* 다리 좌/우 교대 스텝 (위아래 마칭) */
  #pet.walking .leg-l { animation: stepL .44s ease-in-out infinite; }
  #pet.walking .leg-r { animation: stepR .44s ease-in-out infinite; }
  @keyframes stepL { 0%,100% { transform: translateY(-4px); } 50% { transform: translateY(0); } }
  @keyframes stepR { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
  /* 신난 점프 */
  #pet.happy #body-wrap { animation: hop .5s ease; }
  @keyframes hop {
    0%,100% { transform: translateY(0); }
    35% { transform: translateY(-14px) scaleX(.97); }
    70% { transform: translateY(0) scaleY(.92) scaleX(1.05); }
  }
  /* 떨어질 때 살짝 길쭉 */
  #pet.falling #body-wrap { animation: none; transform: scaleY(1.06) scaleX(.95); }

  /* 바라보는 방향 뒤집기 (얼굴 유지용 내부 래퍼) */
  #flip { width: 100%; height: 100%; transition: transform .15s; }

  #face-hit {
    position: absolute; left: 30px; bottom: 5px;
    width: 60px; height: 58px;
    cursor: pointer; z-index: 5;
  }
  svg { display: block; width: 100%; height: 100%; overflow: visible; }
  svg rect { shape-rendering: crispEdges; }

  .eye-lid {
    transform-box: fill-box; transform-origin: center;
    animation: blink 4.8s infinite;
  }
  @keyframes blink {
    0%,92%,100% { transform: scaleY(0); }
    95%,97% { transform: scaleY(1); }
  }

  /* 말풍선: 펫 머리 위에 두고 꼬리로 연결 — 위치/폭은 JS가 창·화면 안으로 클램프 (짤림 방지) */
  #bubble {
    position: absolute; left: 44px; bottom: 56px;
    transform: scale(.7) translateY(5px); transform-origin: 20px bottom;
    background: #fff; color: #3a2a23;
    padding: 6px 11px; border-radius: 13px;
    font-size: 13px; font-weight: 600;
    min-width: 30px; max-width: 260px;
    white-space: normal; text-align: center; word-break: keep-all; overflow-wrap: anywhere;
    line-height: 1.38; text-wrap: balance;
    box-shadow: 0 3px 10px rgba(0,0,0,.2);
    opacity: 0; pointer-events: none;
    transition: opacity .18s ease, transform .22s cubic-bezier(.34,1.56,.64,1);
    z-index: 10;
  }
  #bubble.show { opacity: 1; transform: scale(1) translateY(0); }
  #bubble.long { font-size: 12px; line-height: 1.34; }   /* 긴 글은 살짝 작게 — 줄수/높이 초과 방지 */
  #bubble::after {   /* 꼬리: 펫 머리를 향해 아래로 (위치는 JS가 지정) */
    content: ""; position: absolute; bottom: -6px; left: var(--tail-left, 14px);
    border: 6px solid transparent; border-top-color: #fff; border-bottom: 0;
  }

  .heart {
    position: absolute; font-size: 14px; pointer-events: none;
    animation: floatUp 1s ease-out forwards;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(.6); }
    100% { opacity: 0; transform: translateY(-34px) scale(1.2); }
  }

  /* 순간이동 '뿅' — 펫이 뿅 하고 나타나는 스케일 팝 */
  #petbox { transform-origin: 50% 92%; }
  /* ── 환경 반응 몸동작 (poof/roll보다 먼저 선언 → 그 둘이 있을 땐 그쪽이 이김) ── */
  #pet.env-cold #petbox { animation: shiver .11s steps(2) infinite; }   /* 추위: 덜덜 */
  @keyframes shiver { 0% { transform: translateX(-0.7px); } 100% { transform: translateX(0.7px); } }
  #pet.env-wind #petbox { animation: sway 1.8s ease-in-out infinite; }  /* 바람: 휘청 */
  @keyframes sway { 0%,100% { transform: rotate(-3deg); } 50% { transform: rotate(3deg); } }
  #pet.pop #petbox { animation: poof .42s cubic-bezier(.2,1.7,.4,1); }
  @keyframes poof {
    0%   { transform: scale(.15); }
    55%  { transform: scale(1.22); }
    100% { transform: scale(1); }
  }
  /* 뿅 터질 때 사방으로 튀는 반짝이 */
  .spark {
    position: absolute; font-size: 12px; color: #ffd23d; pointer-events: none;
    animation: spark .45s ease-out forwards;
  }
  @keyframes spark {
    0%   { opacity: 1; transform: translate(0,0) scale(.4); }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(1.1); }
  }

  /* ── 졸림(밤·자리비움): 눈꺼풀 반쯤 내려옴 + 가끔 하품 ── */
  #pet.drowsy .eye-lid { animation: none; transform-origin: top; transform: scaleY(.5); }
  #pet.yawn .eye-lid { animation: none; transform-origin: top; transform: scaleY(1); }  /* 하품 순간 눈 감김 */
  #pet.yawn #body-wrap { animation: yawnA .9s ease; }
  @keyframes yawnA {
    0%,100% { transform: translateY(0) scaleY(1); }
    45% { transform: translateY(-3px) scaleY(1.12) scaleX(.97); }
  }

  /* ── 환경 파티클 (더위 땀 / 추위 입김 / 바람 낙엽) ── */
  .sweat {
    position: absolute; width: 5px; height: 7px; pointer-events: none;
    background: #7ec8f0; border-radius: 50% 50% 50% 50% / 62% 62% 38% 38%;
    animation: sweatfall 1.1s ease-in forwards;
  }
  @keyframes sweatfall {
    0% { transform: translateY(0) scale(.6); opacity: 0; }
    25% { opacity: .9; }
    100% { transform: translateY(26px) scale(1); opacity: 0; }
  }
  .breath {
    position: absolute; width: 10px; height: 10px; border-radius: 50%; pointer-events: none;
    background: rgba(255,255,255,.72);
    animation: breathout 1.6s ease-out forwards;
  }
  @keyframes breathout {
    0% { transform: translate(0,0) scale(.3); opacity: 0; }
    30% { opacity: .8; }
    100% { transform: translate(18px,-10px) scale(1.35); opacity: 0; }
  }
  .leaf {
    position: absolute; font-size: 12px; pointer-events: none;
    animation: leaffly 2.6s linear forwards;
  }
  @keyframes leaffly {
    0% { transform: translate(0,0) rotate(0); opacity: 0; }
    15% { opacity: 1; }
    100% { transform: translate(150px,-8px) rotate(220deg); opacity: 0; }
  }

  /* ── 놀람(집어들 때): 움찔 + "!" ── */
  #pet.surprised #body-wrap { animation: startle .5s ease; }
  @keyframes startle {
    0%,100% { transform: translateY(0) scale(1); }
    22% { transform: translateY(-9px) scaleY(1.12) scaleX(.92); }
    55% { transform: translateY(0) scaleY(.95) scaleX(1.05); }
  }
  .excl {
    position: absolute; left: 66px; bottom: 66px; font-size: 17px; font-weight: 900;
    color: #ffcf3a; -webkit-text-stroke: 1.2px #b9820e; pointer-events: none;
    animation: exclpop .65s ease forwards;
  }
  @keyframes exclpop {
    0% { opacity: 0; transform: translateY(6px) scale(.4); }
    30% { opacity: 1; transform: translateY(-3px) scale(1.15); }
    100% { opacity: 0; transform: translateY(-12px) scale(1); }
  }

  /* ── 앉아 쉬기 → 눕기 (오래 가만히 있을 때) ── */
  #pet.resting #body-wrap { animation: none; transform-origin: 50% 100%;
    transform: translateY(6px) scaleY(.86) scaleX(1.06); transition: transform .45s ease; }
  #pet.resting .leg-l, #pet.resting .leg-r { animation: none; transform: translateY(7px); transition: transform .45s ease; }
  #pet.lying #petbox { transform-origin: 50% 100%; transform: translateY(9px) rotate(-11deg); transition: transform .6s ease; }

  /* ── 맑은 날 콧노래 ♪ / 밤 별 ✨ ── */
  .note { position: absolute; font-size: 13px; pointer-events: none; color: #f0a030;
    animation: notefloat 1.9s ease-out forwards; }
  @keyframes notefloat {
    0% { opacity: 0; transform: translate(0,0) rotate(-8deg); }
    25% { opacity: 1; }
    100% { opacity: 0; transform: translate(16px,-28px) rotate(16deg); }
  }
  .star { position: absolute; font-size: 12px; pointer-events: none;
    animation: startw 2s ease-in-out forwards; }
  @keyframes startw {
    0% { opacity: 0; transform: scale(.4); }
    40% { opacity: 1; transform: scale(1.1); }
    100% { opacity: 0; transform: scale(.6); }
  }

  /* ── 3차 배치 ── */
  /* 하트 눈 (SVG <text>에 적용) */
  .hearteye { transform-box: fill-box; transform-origin: center; animation: hbeat .6s ease-in-out infinite; }
  @keyframes hbeat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.3); } }
  /* 춤추기 */
  #pet.dance #body-wrap { animation: dance .5s ease-in-out infinite; }
  @keyframes dance { 0%,100% { transform: rotate(-8deg) translateY(0); } 50% { transform: rotate(8deg) translateY(-3px); } }
  /* 딸꾹질/재채기 */
  #pet.hiccup #petbox { animation: hic .34s ease; }
  @keyframes hic { 0%,100% { transform: translateY(0); } 40% { transform: translateY(-6px) scaleY(1.08); } }
  /* 삐짐(부루퉁) */
  #pet.sulk #body-wrap { animation: none; transform: rotate(7deg) translateY(-1px); }
  /* 커서 알아챔(쫑긋) */
  #pet.notice #body-wrap { animation: perk .45s ease; }
  @keyframes perk { 0%,100% { transform: translateY(0); } 45% { transform: translateY(-5px); } }
  /* 간식 냠냠 */
  #pet.snacking #body-wrap { animation: nibble .3s ease-in-out infinite; }
  @keyframes nibble { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-1.6px) scaleY(.97); } }
  .cookie { position: absolute; font-size: 15px; pointer-events: none; animation: cookiein .3s ease; }
  @keyframes cookiein { 0% { transform: scale(.3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  /* 머리 위 마크 (?, 💢, ! 등) */
  .mark { position: absolute; left: 64px; bottom: 66px; font-size: 15px; font-weight: 800; pointer-events: none;
    animation: exclpop .8s ease forwards; }
  /* 벽에 기대기 (좌/우) */
  #pet.lean-l #petbox { transform-origin: 0% 100%; transform: rotate(10deg) translateY(4px); transition: transform .5s ease; }
  #pet.lean-r #petbox { transform-origin: 100% 100%; transform: rotate(-10deg) translateY(4px); transition: transform .5s ease; }
  /* 봄 꽃잎 / (가을은 leaf 재사용) */
  .petal { position: absolute; top: -12px; font-size: 11px; pointer-events: none; animation: petalfall linear forwards; }
  @keyframes petalfall {
    0% { transform: translateY(-12px) translateX(0) rotate(0); opacity: 0; }
    12% { opacity: 1; }
    100% { transform: translateY(150px) translateX(18px) rotate(200deg); opacity: 0; }
  }
  /* 저녁 노을 (펫 뒤 은은한 빛) */
  #glow { position: absolute; left: 8px; bottom: 4px; width: 104px; height: 92px; border-radius: 50%; z-index: 0;
    background: radial-gradient(circle, rgba(255,168,88,.42), rgba(255,168,88,0) 70%);
    opacity: 0; transition: opacity 1.2s ease; pointer-events: none; }
  #pet.glow #glow { opacity: 1; }

  /* ── 자리비움(낮잠) ── */
  #zzz { position: absolute; inset: 0; pointer-events: none; z-index: 6; }
  .zc {
    position: absolute; bottom: 78px; font-size: 14px; font-weight: 800; color: #7fa7d0;
    text-shadow: 0 1px 2px rgba(0,0,0,.15); animation: zup 1.8s ease-out forwards;
  }
  @keyframes zup {
    0% { opacity: 0; transform: translateY(0) scale(.6); }
    20% { opacity: .95; }
    100% { opacity: 0; transform: translateY(-30px) scale(1.25); }
  }
  #pet.napping #body-wrap { animation: napbreathe 4s ease-in-out infinite; }
  @keyframes napbreathe {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-1px) rotate(-3deg); }
  }

  /* ── 랜덤 돌발 행동 ── */
  #pet.trick-stretch #body-wrap { animation: stretch 1.1s ease; }
  @keyframes stretch {
    0%,100% { transform: translateY(0) scaleY(1); }
    30% { transform: translateY(-6px) scaleY(1.14) scaleX(.94); }
    60% { transform: translateY(0) scaleY(.96) scaleX(1.05); }
  }
  #pet.trick-roll #petbox { transform-origin: 50% 60%; animation: rolly 1.1s ease-in-out; }
  @keyframes rolly {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
  #pet.trick-peek #body-wrap { animation: peek 1.2s ease-in-out; }
  @keyframes peek {
    0%,100% { transform: rotate(0deg); }
    20% { transform: rotate(-13deg); }
    50% { transform: rotate(11deg); }
    80% { transform: rotate(-6deg); }
  }
  .bfly {
    position: absolute; left: 10px; bottom: 70px; font-size: 16px;
    pointer-events: none; animation: fly 3.2s ease-in-out forwards;
  }
  @keyframes fly {
    0% { transform: translate(0,0) rotate(0deg); }
    25% { transform: translate(72px,-24px) rotate(10deg); }
    50% { transform: translate(120px,8px) rotate(-8deg); }
    75% { transform: translate(48px,-30px) rotate(12deg); }
    100% { transform: translate(140px,-52px) rotate(0deg); opacity: 0; }
  }

  /* ── 계절/날씨 연출 ── */
  #weather { position: absolute; inset: 0; pointer-events: none; overflow: hidden; z-index: 1; }
  .raindrop {
    position: absolute; top: -12px; width: 2px; height: 11px; border-radius: 1px;
    background: linear-gradient(#8bb9e8, rgba(139,185,232,0)); opacity: .7;
    animation: rainfall linear infinite;
  }
  @keyframes rainfall { 0% { transform: translateY(-12px); } 100% { transform: translateY(150px); } }
  .snowflake {
    position: absolute; top: -12px; font-size: 10px; color: #fff;
    text-shadow: 0 0 2px #9cc; animation: snowfall linear infinite;
  }
  @keyframes snowfall {
    0% { transform: translateY(-12px) translateX(0) rotate(0deg); }
    100% { transform: translateY(150px) translateX(12px) rotate(200deg); }
  }
  .prop { position: absolute; pointer-events: none; }
  .prop.umbrella { left: 50px; bottom: 80px; font-size: 22px; }
  .prop.snowman { left: 92px; bottom: 8px; font-size: 20px; }
</style>
</head>

  function rectInto(g, x, y, w, h, fill, cls) {
    const r = document.createElementNS(NS, 'rect');
    r.setAttribute('x', x); r.setAttribute('y', y);
    r.setAttribute('width', w); r.setAttribute('height', h);
    r.setAttribute('fill', fill);
    if (cls) r.setAttribute('class', cls);
    g.appendChild(r);
  }
  function mkG(cls) {
    const g = document.createElementNS(NS, 'g');

  function render(name) {
    const sk = SKINS[name] || SKINS.claude;
    curSkin = SKINS[name] ? name : 'claude';
    const grid = sk.grid, rows = grid.length, cols = grid[0].length;
    const CS = sk.s || S;             // 셀 크기 (고해상도 스킨은 4, 기본 6)
    const OX = 60 - cols * CS / 2;    // 가로 가운데
    const OY = 94 - rows * CS;        // 발끝을 항상 같은 바닥(y≈94)에 맞춤
    while (pixgroup.firstChild) pixgroup.removeChild(pixgroup.firstChild);

    const legRow = {};
    for (let r = rows - 1; r >= Math.max(0, rows - 3); r--) {
      if ((grid[r].match(/[^.\s]+/g) || []).length >= 2) legRow[r] = true;
    }

    const shadowG = mkG();
    rectInto(shadowG, OX + cols * CS * 0.18, 96, cols * CS * 0.64, 5, 'rgba(0,0,0,.12)');
    const legLG = mkG('leg-l'), legRG = mkG('leg-r'), bodyG = mkG();   // 왼다리/오른다리/몸통

    const eyes = [];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const ch = grid[r][c];
        if (ch === '.' || ch === ' ') continue;
        const g = legRow[r] ? (c < cols / 2 ? legLG : legRG) : bodyG;
        rectInto(g, OX + c * CS, OY + r * CS, CS + 0.6, CS + 0.6, sk.pal[ch] || '#000');
        if (ch === 'K' || ch === 'W') eyes.push([c, r]);   // W=눈 반사광도 깜빡임에 포함
      }
    }
    for (const [c, r] of eyes)   // 깜빡임 덮개
      rectInto(bodyG, OX + c * CS, OY + r * CS, CS + 0.6, CS + 0.6, sk.eyelid, 'eye-lid');

    const lefts = eyes.filter(([c]) => c < cols / 2), rights = eyes.filter(([c]) => c >= cols / 2);
    const cheek = (cells, side) => {
      if (!cells.length) return null;
      let mn = 99, mx = -1, mr = -1;
      for (const [c, r] of cells) { mn = Math.min(mn, c); mx = Math.max(mx, c); mr = Math.max(mr, r); }
      return [side === 'L' ? mn : mx - 1, mr + 1];
    };
    curCheeks = [cheek(lefts, 'L'), cheek(rights, 'R')].filter(Boolean);
    const eyeCenter = (cells) => {
      if (!cells.length) return null;
      let sc = 0, sr = 0; for (const [c, r] of cells) { sc += c; sr += r; }
      return [OX + (sc / cells.length + 0.5) * CS, OY + (sr / cells.length + 0.5) * CS];
    };
    curEyeC = [eyeCenter(lefts), eyeCenter(rights)].filter(Boolean);
    moodG = mkG('mood');   // blush·하트눈 등 기분 오버레이 (맨 위)
  }

  const EMOJI_RE = /[\p{Extended_Pictographic}️‍⃣]/gu;

  function say(text, ms = 1500) {
    const t = stripEmoji(text);
    if (!t) return;                 // 이모지만 있던 메시지는 건너뜀
    bubble.textContent = t;
    bubble.classList.toggle('long', t.length > 28);    // 아주 긴 글만 살짝 작은 글씨

    // 화면에 실제로 보이는 창-로컬 x 범위 [visL, visR] (모니터 밖으로 안 나가게)
    const scr = window.screen || {};
    const sL = scr.availLeft || 0, sR = sL + (scr.availWidth || 1920);
    const winW = window.innerWidth || 300;
    const visL = Math.max(2, (sL - window.screenX) + 2);
    const visR = Math.min(winW - 2, (sR - window.screenX) - 2);
    const HEAD_X = 57;              // 펫 머리 중심 x

    // 폭: 상한(260)·보이는 폭 안에서, '줄 수가 늘지 않는 최소 폭'을 이진탐색해 텍스트에 딱 맞춤 (흰 여백 제거)
    // offsetHeight는 CSS 변형(scale)과 무관한 레이아웃 값이라 측정이 정확함
    const maxW = Math.max(60, Math.min(260, visR - visL));
    bubble.style.maxWidth = maxW + 'px';
    bubble.style.width = maxW + 'px';
    const fullH = bubble.offsetHeight;                  // 최대 폭에서의 높이(= 최소 줄 수)
    let lo = 30, hi = maxW, best = maxW;
    while (lo <= hi) {
      const mid = (lo + hi) >> 1;
      bubble.style.width = mid + 'px';
      // 줄 수 그대로 + 가로 넘침 없으면 더 줄여봄
      if (bubble.offsetHeight <= fullH && bubble.scrollWidth <= bubble.offsetWidth + 1) { best = mid; hi = mid - 1; }
      else lo = mid + 1;                                                 // 줄이 늘거나 넘치면 넓혀야 함
    }
    const w = best;
    bubble.style.width = w + 'px';
    let left = Math.round(HEAD_X - w / 2);              // 머리 위 가운데 정렬
    left = Math.max(visL, Math.min(left, visR - w));    // 보이는 화면 안으로 클램프
    if (visR - visL < w) left = visL;                   // 공간이 폭보다 좁으면 왼쪽에 붙임
    bubble.style.left = left + 'px';

    let tail = HEAD_X - left - 6;                       // 꼬리는 항상 머리를 가리킴
    tail = Math.max(8, Math.min(tail, w - 20));
    bubble.style.setProperty('--tail-left', tail + 'px');
    bubble.style.transformOrigin = (tail + 6) + 'px bottom';   // 꼬리에서 뿅 하고 피어남

    bubble.classList.add('show');
    clearTimeout(say._t);
    say._t = setTimeout(() => bubble.classList.remove('show'), ms);

      const near = e.clientX > hitR.left - 42 && e.clientX < hitR.right + 42 &&
                   e.clientY > hitR.top - 34 && e.clientY < hitR.bottom + 22;
      if (near && Date.now() - lastNotice > 4500) {
        lastNotice = Date.now();
        pet.classList.add('notice'); mark('?');
        setTimeout(() => pet.classList.remove('notice'), 460);
      }
    }
  });
  window.addEventListener('mouseout', (e) => { if (!e.relatedTarget && !down) setOver(false); });
  // 더블클릭 재롱 (구르기 + 하트)
  pet.addEventListener('dblclick', () => { if (overPet) { playTrick('roll'); hop(); heart(); } });
  window.petAPI?.setMouseIgnore?.(true);           // 시작은 통과 상태 (펫 위로 오면 자동 해제)

  // 우클릭 메뉴
  window.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    window.petAPI?.showContextMenu();
  });

  // 메인 프로세스가 보내는 상태 반영 (walk / idle / fall / held / climb / ceil)
  window.petAPI?.onState(({ mode, dir, side }) => {
    curMode = mode;
    let t = 'scaleX(1)';
    if (mode === 'climb') t = side === 'L' ? 'rotate(90deg)' : 'rotate(-90deg)';
    else if (mode === 'ceil') t = 'scaleY(-1)' + (dir < 0 ? ' scaleX(-1)' : '');   // 천장에서도 이동 방향 바라보기
    else if (dir) t = dir < 0 ? 'scaleX(-1)' : 'scaleX(1)';
    flip.style.transform = t;
    const wasFall = pet.classList.contains('falling');
    pet.classList.toggle('walking', mode === 'walk');
    pet.classList.toggle('falling', mode === 'fall');
    if (mode === 'fall' && !wasFall) spawnEnv('sweat');   // 떨어질 때 당황(땀)
  });

  // 스킨 변경
  window.petAPI?.onSetSkin?.((name) => render(name));

  // 메인에서 보내는 메시지(날씨 등) 말풍선으로
  window.petAPI?.onSay?.((text) => say(text, Math.min(5000, 2200 + text.length * 90)));

  // 먹이/기쁨 반응 (폴짝 + 하트 + 반짝이)
  window.petAPI?.onCheer?.(() => { hop(); heart(); sparkleBurst(); });

  // 알람 순간이동 '뿅'
  window.petAPI?.onPop?.(() => poof());

  // ── 자리비움(낮잠) 연출 ──
  let napTimer = null;
  function setNap(on) {
    pet.classList.toggle('napping', !!on);
    const z = document.getElementById('zzz');
    if (napTimer) { clearInterval(napTimer); napTimer = null; }
    z.innerHTML = '';
    if (on) {
      napTimer = setInterval(() => {
        const s = document.createElement('div');
        s.className = 'zc'; s.textContent = 'z';
        s.style.left = (64 + Math.random() * 10) + 'px';
        z.appendChild(s);
        setTimeout(() => s.remove(), 1800);
      }, 700);
    }
  }
  window.petAPI?.onNap?.((on) => setNap(on));

  // ── 기분: 쓰담 반복 시 볼 홍조 + 하트 (love) ──
  let petCnt = 0, petCntT = 0, loveT = null;
  function setLove(on, hearts) {
    pet.classList.toggle('loved', on);
    if (!moodG) return;
    while (moodG.firstChild) moodG.removeChild(moodG.firstChild);
    if (!on) return;
    for (const [c, r] of curCheeks)      // 볼 홍조
      rectInto(moodG, curOX + c * curCS - 1, curOY + r * curCS, curCS * 2, curCS * 1.5, 'rgba(255,120,150,.5)');
    if (hearts) for (const [x, y] of curEyeC) {   // 하트 눈
      const t = document.createElementNS(NS, 'text');
      t.setAttribute('x', x); t.setAttribute('y', y + curCS);
      t.setAttribute('text-anchor', 'middle'); t.setAttribute('font-size', curCS * 3.2);
      t.setAttribute('fill', '#ff4d6d'); t.setAttribute('class', 'hearteye');
      t.textContent = '♥';
      moodG.appendChild(t);
    }
  }
  function petLove() {
    const now = Date.now();
    if (now - petCntT > 2500) petCnt = 0;
    petCntT = now; petCnt++;
    if (petCnt >= 2) {                     // 2번+ 쓰담 → 홍조/하트, 4번+ → 하트 눈
      setLove(true, petCnt >= 4); heart();
      clearTimeout(loveT); loveT = setTimeout(() => setLove(false), 2600);
    }
  }

  // ── 졸림(밤·자리비움): 눈 반쯤 감기 + 가끔 하품 ──
  let drowsy = false, yawnTimer = null, starTimer = null;
  function setDrowsy(on) {
    if (on === drowsy) return;
    drowsy = on;
    pet.classList.toggle('drowsy', on);
    if (yawnTimer) { clearInterval(yawnTimer); yawnTimer = null; }
    if (on) {
      yawnTimer = setInterval(() => {
        if (curMode === 'idle' && !pet.classList.contains('napping')) {
          pet.classList.add('yawn');
          setTimeout(() => pet.classList.remove('yawn'), 900);
        }
      }, 15000 + Math.random() * 9000);
      starTimer = setInterval(() => spawnEnv('star'), 3800);   // 밤엔 머리 위 반짝 별
    }
    if (!on && starTimer) { clearInterval(starTimer); starTimer = null; }
  }
  window.petAPI?.onMood?.((m) => setDrowsy(m === 'drowsy'));

  // 놀람: 움찔 + "!" (집어들 때)
  function surprise() {
    pet.classList.remove('surprised'); void pet.offsetWidth; pet.classList.add('surprised');
    setTimeout(() => pet.classList.remove('surprised'), 520);
    const e = document.createElement('div');
    e.className = 'excl'; e.textContent = '!';
    pet.appendChild(e);
    setTimeout(() => e.remove(), 660);
  }

  // 앉아 쉬기 → 눕기 / 벽 기대기 (메인이 신호)
  function setRest(phase) {
    pet.classList.remove('resting', 'lying', 'lean-l', 'lean-r');
    if (phase === 'sit') pet.classList.add('resting');
    else if (phase === 'lie') pet.classList.add('resting', 'lying');
    else if (phase === 'lean-l') pet.classList.add('lean-l');
    else if (phase === 'lean-r') pet.classList.add('lean-r');
    // 'end' → 모두 해제
  }
  window.petAPI?.onRest?.((phase) => setRest(phase));

  // 사방으로 튀는 반짝이 (신남/기쁨)
  function sparkleBurst() {
    for (let i = 0; i < 6; i++) {
      const s = document.createElement('div');
      s.className = 'spark';
      const a = Math.PI * 2 * i / 6;
      s.style.setProperty('--dx', (Math.cos(a) * 24).toFixed(1) + 'px');
      s.style.setProperty('--dy', (Math.sin(a) * 24 - 6).toFixed(1) + 'px');
      s.style.left = '58px'; s.style.bottom = '62px'; s.textContent = '✦';
      pet.appendChild(s);
      setTimeout(() => s.remove(), 470);
    }
  }
  // 간식 냠냠
  function snack() {
    const c = document.createElement('div');
    c.className = 'cookie'; c.textContent = '🍪';
    c.style.left = '78px'; c.style.bottom = '46px';
    pet.appendChild(c);
    pet.classList.add('snacking');
    setTimeout(() => { pet.classList.remove('snacking'); c.remove(); }, 2200);
  }
  // 한방향 반응: 삐짐 / 신남 / 간식
  function onReact(type) {
    if (type === 'sulk') { pet.classList.add('sulk'); mark('💢'); setTimeout(() => pet.classList.remove('sulk'), 2600); }
    else if (type === 'excited') { hop(); heart(); sparkleBurst(); mark('❗'); }
    else if (type === 'snack') { snack(); }
  }
  window.petAPI?.onReact?.((type) => onReact(type));

  // 계절 앰비언트(봄 꽃잎/가을 낙엽) + 저녁 노을
  let seasonTimer = null, curSeason = '';
  function spawnAmbient(kind) {
    const w = document.getElementById('weather');
    const d = document.createElement('div');
    d.className = 'petal';
    d.textContent = kind === 'spring' ? (Math.random() < .5 ? '🌸' : '🌷') : (Math.random() < .5 ? '🍂' : '🍁');
    d.style.left = (6 + Math.random() * 150) + 'px';
    d.style.animationDuration = (3.6 + Math.random() * 2).toFixed(1) + 's';
    w.appendChild(d);
    setTimeout(() => d.remove(), 6200);
  }
  function setAmbient(a) {
    pet.classList.toggle('glow', !!(a && a.glow));   // 저녁 노을
    const season = a ? (a.season || '') : '';
    if (season === curSeason) return;
    curSeason = season;
    if (seasonTimer) { clearInterval(seasonTimer); seasonTimer = null; }
    if (season === 'spring' || season === 'autumn') seasonTimer = setInterval(() => spawnAmbient(season), 3000);
  }
  window.petAPI?.onAmbient?.((a) => setAmbient(a));

  // ── 환경 반응: 더위 땀 / 추위 입김+떨기 / 바람 낙엽+휘청 ──
  let envTimer = null;
  function spawnEnv(type) {
    const w = document.getElementById('weather');
    const d = document.createElement('div');
    if (type === 'sweat') { d.className = 'sweat'; d.style.left = (74 + Math.random() * 8) + 'px'; d.style.top = '34px'; }
    else if (type === 'breath') { d.className = 'breath'; d.style.left = '72px'; d.style.top = '52px'; }
    else if (type === 'leaf') { d.className = 'leaf'; d.textContent = '🍃'; d.style.left = '2px'; d.style.top = (36 + Math.random() * 10) + 'px'; }
    else if (type === 'note') { d.className = 'note'; d.textContent = Math.random() < 0.5 ? '♪' : '♩'; d.style.left = (70 + Math.random() * 12) + 'px'; d.style.top = '34px'; }
    else if (type === 'star') { d.className = 'star'; d.textContent = Math.random() < 0.5 ? '✦' : '✧'; d.style.left = (58 + Math.random() * 20) + 'px'; d.style.top = (26 + Math.random() * 8) + 'px'; d.style.color = '#ffe07a'; }
    w.appendChild(d);
    setTimeout(() => d.remove(), 2800);
  }
  function setEnv(bucket) {
    pet.classList.remove('env-cold', 'env-wind');
    if (envTimer) { clearInterval(envTimer); envTimer = null; }
    if (bucket === 'hot') envTimer = setInterval(() => spawnEnv('sweat'), 1400);
    else if (bucket === 'cold') { pet.classList.add('env-cold'); envTimer = setInterval(() => spawnEnv('breath'), 2000); }
    else if (bucket === 'wind') { pet.classList.add('env-wind'); envTimer = setInterval(() => spawnEnv('leaf'), 2200); }
    else if (bucket === 'clear') envTimer = setInterval(() => { if (curMode === 'idle' && Math.random() < 0.5) spawnEnv('note'); }, 3600);   // 맑으면 콧노래 ♪
  }

  // ── 랜덤 돌발 행동 ──
  function butterfly() {
    const b = document.createElement('div');
    b.className = 'bfly'; b.textContent = '🦋';
    pet.appendChild(b);
    let n = 0;
    const h = setInterval(() => { hop(); if (++n >= 3) clearInterval(h); }, 550);
    setTimeout(() => b.remove(), 3200);
  }
  function playTrick(type) {
    if (type === 'butterfly') { butterfly(); return; }
    const cls = { stretch: 'trick-stretch', roll: 'trick-roll', peek: 'trick-peek', dance: 'dance', hiccup: 'hiccup' }[type];
    if (!cls) return;
    const dur = { roll: 1120, dance: 2400, hiccup: 360 }[type] || 1220;
    if (type === 'hiccup') mark('💢');   // 딸꾹질/재채기 표시
    if (type === 'dance') { for (let i = 0; i < 3; i++) setTimeout(() => spawnEnv('note'), i * 500); }
    pet.classList.remove(cls); void pet.offsetWidth; pet.classList.add(cls);
    setTimeout(() => pet.classList.remove(cls), dur);
  }
  // 머리 위 마크 (?, 💢, ! 등)
  function mark(ch) {
    const m = document.createElement('div');
    m.className = 'mark'; m.textContent = ch;
    pet.appendChild(m);
    setTimeout(() => m.remove(), 820);
  }
  window.petAPI?.onTrick?.((type) => playTrick(type));

  // ── 계절/날씨 연출 (비=우산+빗방울, 눈=눈사람+눈송이) ──
  let curWeather = '';
  function makeParticles(w, cls, n) {
    for (let i = 0; i < n; i++) {
      const p = document.createElement('div');
      p.className = cls;
      p.style.left = (6 + Math.random() * 150) + 'px';
      p.style.animationDelay = (Math.random() * 3).toFixed(2) + 's';
      p.style.animationDuration = (2.4 + Math.random() * 1.8).toFixed(2) + 's';
      if (cls === 'snowflake') p.textContent = '❄';
      w.appendChild(p);
    }
  }
  function addProp(w, ch, cls) {
    const p = document.createElement('div');
    p.className = 'prop ' + cls; p.textContent = ch;
    w.appendChild(p);
  }
  function setWeather(bucket) {
    if (bucket === curWeather) return;
    curWeather = bucket;
    const w = document.getElementById('weather');
    w.innerHTML = '';
    if (bucket === 'rain') { makeParticles(w, 'raindrop', 7); addProp(w, '☂', 'umbrella'); }
    else if (bucket === 'snow') { makeParticles(w, 'snowflake', 9); addProp(w, '⛄', 'snowman'); }
    setEnv(bucket);   // 더위 땀 / 추위 입김·떨기 / 바람 낙엽·휘청 (그 외엔 해제)
  }
  window.petAPI?.onWeather?.((bucket) => setWeather(bucket || ''));

  // 쉬는 동안 가끔 깡총/하트 (말풍선 텍스트는 메인이 성격대로 전송)
  setInterval(() => {
    if (curMode === 'idle' && !pet.classList.contains('napping')
        && !pet.classList.contains('resting') && Math.random() < 0.12) {
      hop(); if (Math.random() < 0.5) heart();
    }
  }, 5000);
</script>
</body>
</html>
